<!DOCTYPE html>
<html>
<head>
  <title>HTML Tags</title>
</head>
<body>
  <h1>Emily Reyes</h1>
  <ul>
    <li>hello</li>
  </ul>
  
  <!-- This is br and it Inserts a line break. -->
 <br>
  
  <!-- This is hr and it Inserts a thematic break (horizontal rule). -->
<hr>: 

  <!-- This is header and it Represents introductory content or a set of navigational links for a section. -->
<header>

  <!-- This is footer and it Represents the footer of a document or a section. -->
<footer>: Represents the footer of a document or a section.

  <!-- This is nav and it Represents a section of navigation links. -->
<nav>: Represents a section of navigation links.

  <!-- This is section and it Represents a standalone section of content. -->
<section>: Represents a standalone section of content.

  <!-- This is article and it Represents self-contained content, like a blog post or news article. -->
<article>: Represents self-contained content, like a blog post or news article.
  
</body>
</html>
